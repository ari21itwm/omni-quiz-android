name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "feature/ci-and-feedback" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Lint, Unit Tests and Build
      run: ./gradlew lintDebug testDebugUnitTest assembleDebug --parallel
